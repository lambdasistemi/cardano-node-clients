name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  build-gate:
    name: Build Gate
    runs-on: nixos
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/cachix-action@v15
        with:
          name: paolino
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Build all derivations
        run: >-
          nix build --quiet
          .#devShells.x86_64-linux.default.inputDerivation
  build:
    needs: build-gate
    runs-on: nixos
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/cachix-action@v15
        with:
          name: paolino
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Build
        run: nix develop --quiet -c just build
  e2e:
    needs: build-gate
    runs-on: nixos
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/cachix-action@v15
        with:
          name: paolino
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: E2E tests
        run: nix develop --quiet -c just e2e
  lint:
    needs: build-gate
    runs-on: nixos
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/cachix-action@v15
        with:
          name: paolino
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Format check
        run: >-
          nix develop --quiet -c bash -c
          "cabal-fmt -c cardano-node-clients.cabal &&
          find . -type f -name '*.hs' -not -path '*/dist-newstyle/*' -exec fourmolu -m check {} +"
      - name: HLint
        run: >-
          nix develop --quiet -c bash -c
          "find . -type f -name '*.hs' -not -path '*/dist-newstyle/*' -exec hlint {} +"
  docs:
    runs-on: nixos
    if: github.ref == 'refs/heads/main'
    needs: [build, e2e, lint]
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/cachix-action@v15
        with:
          name: paolino
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Deploy docs
        run: nix develop --quiet -c mkdocs gh-deploy --force
