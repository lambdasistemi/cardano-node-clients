<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light" />
    <title>Conway tx inspector - Haskell ledger, wasm32-wasi</title>
    <link rel="icon" href="data:," />
    <style>
      :root {
        color-scheme: light;
        --page: #f5f7fa;
        --surface: #ffffff;
        --surface-soft: #f9fbfd;
        --text: #17212f;
        --muted: #5d6b7a;
        --border: #d9e1ea;
        --border-strong: #b9c6d4;
        --accent: #0a7b83;
        --accent-strong: #075f66;
        --accent-soft: #e6f4f5;
        --danger: #b42318;
        --danger-soft: #fff0ed;
        --warning: #835800;
        --warning-soft: #fff7df;
        --shadow: 0 14px 34px rgba(23, 33, 47, 0.08);
        font-family:
          ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        font-size: 15px;
        line-height: 1.5;
      }

      * {
        box-sizing: border-box;
      }

      html {
        background: var(--page);
      }

      body {
        margin: 0;
        min-width: 320px;
        background: var(--page);
        color: var(--text);
      }

      a {
        color: var(--accent-strong);
        text-decoration-thickness: 1px;
        text-underline-offset: 0.18em;
      }

      button,
      input,
      textarea {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      button:disabled {
        cursor: wait;
        opacity: 0.68;
      }

      code,
      pre,
      textarea,
      input[type="text"],
      input[type="password"] {
        font-family:
          ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono",
          monospace;
      }

      code {
        border: 1px solid var(--border);
        border-radius: 6px;
        background: var(--surface-soft);
        padding: 0.1rem 0.35rem;
        color: #334155;
        font-size: 0.88em;
      }

      .page-frame {
        width: min(100% - 32px, 1180px);
        margin-inline: auto;
      }

      .site-header {
        background: rgba(255, 255, 255, 0.92);
        border-bottom: 1px solid var(--border);
      }

      .topbar {
        min-height: 64px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
      }

      .brand {
        display: flex;
        flex-direction: column;
        gap: 0.1rem;
      }

      .brand strong {
        font-size: 1rem;
      }

      .brand span,
      .site-footer {
        color: var(--muted);
        font-size: 0.88rem;
      }

      .header-link {
        min-height: 40px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--surface);
        padding: 0.42rem 0.72rem;
        color: var(--text);
        text-decoration: none;
      }

      main.page-frame {
        padding-block: 24px 18px;
      }

      .app-shell {
        display: grid;
        gap: 18px;
      }

      .intro-strip {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 1rem;
      }

      .intro-strip h1,
      .panel h2,
      .panel h3,
      .intro-strip p,
      .panel p,
      fieldset {
        margin: 0;
      }

      .intro-strip h1 {
        font-size: 1.65rem;
        line-height: 1.15;
      }

      .intro-strip p {
        max-width: 68ch;
        color: var(--muted);
        margin-top: 0.35rem;
      }

      .tech-pills {
        display: flex;
        flex-wrap: wrap;
        justify-content: end;
        gap: 0.45rem;
      }

      .tech-pills span {
        border: 1px solid var(--border);
        border-radius: 999px;
        background: var(--surface);
        padding: 0.26rem 0.55rem;
        color: var(--muted);
        font-size: 0.82rem;
        white-space: nowrap;
      }

      .workspace {
        display: grid;
        grid-template-columns: minmax(280px, 0.78fr) minmax(0, 1.22fr);
        gap: 18px;
        align-items: start;
      }

      .workspace-main {
        display: grid;
        gap: 18px;
        min-width: 0;
      }

      .panel {
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--surface);
        box-shadow: var(--shadow);
        padding: 18px;
      }

      .provider-panel {
        position: sticky;
        top: 16px;
      }

      .panel-heading {
        display: flex;
        align-items: start;
        justify-content: space-between;
        gap: 1rem;
        border-bottom: 1px solid var(--border);
        padding-bottom: 13px;
        margin-bottom: 16px;
      }

      .provider-panel .panel-heading {
        display: grid;
        gap: 0.25rem;
      }

      .panel-heading h2 {
        font-size: 1.06rem;
        line-height: 1.25;
      }

      .panel-heading p {
        color: var(--muted);
        font-size: 0.9rem;
        margin-top: 0.25rem;
      }

      .control-group {
        min-width: 0;
        border: 0;
        padding: 0;
      }

      .control-group + .field-stack,
      .field-stack + .control-group,
      .control-group + .persist-block {
        margin-top: 16px;
      }

      legend {
        padding: 0;
        color: var(--muted);
        font-size: 0.76rem;
        font-weight: 700;
        text-transform: uppercase;
        margin-bottom: 0.5rem;
      }

      .option-stack,
      .mode-options {
        display: grid;
        gap: 8px;
      }

      .mode-options {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .choice-option {
        display: flex;
        align-items: center;
        gap: 0.58rem;
        min-height: 42px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--surface-soft);
        padding: 0.58rem 0.68rem;
        color: var(--text);
      }

      .choice-option.is-selected {
        border-color: var(--accent);
        background: var(--accent-soft);
        box-shadow: inset 0 0 0 1px var(--accent);
      }

      .choice-option input {
        width: 1rem;
        height: 1rem;
        margin: 0;
        accent-color: var(--accent);
        flex: 0 0 auto;
      }

      .choice-copy {
        min-width: 0;
      }

      .choice-title {
        font-weight: 650;
      }

      .field-stack {
        display: grid;
        gap: 0.45rem;
      }

      .field-label {
        display: flex;
        justify-content: space-between;
        gap: 0.75rem;
        color: var(--text);
        font-weight: 650;
      }

      input[type="text"],
      input[type="password"],
      textarea {
        width: 100%;
        min-width: 0;
        border: 1px solid var(--border-strong);
        border-radius: 7px;
        background: #ffffff;
        color: var(--text);
        padding: 0.7rem 0.78rem;
        outline: none;
        transition:
          border-color 120ms ease,
          box-shadow 120ms ease;
      }

      input[type="text"],
      input[type="password"] {
        min-height: 42px;
        font-size: 0.92rem;
      }

      textarea {
        min-height: 180px;
        resize: vertical;
        font-size: 0.88rem;
      }

      input:focus,
      textarea:focus,
      button:focus-visible,
      .header-link:focus-visible,
      .choice-option:focus-within {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px var(--accent-soft);
      }

      .persist-block {
        display: grid;
        gap: 0.55rem;
      }

      .switch-row {
        display: flex;
        align-items: center;
        gap: 0.6rem;
        font-weight: 650;
      }

      .switch-row input {
        width: 2.35rem;
        height: 1.2rem;
        accent-color: var(--accent);
      }

      .warning-note {
        border: 1px solid #efd89a;
        border-radius: 8px;
        background: var(--warning-soft);
        padding: 0.72rem 0.82rem;
        color: var(--warning);
        font-size: 0.88rem;
      }

      .decode-form {
        display: grid;
        gap: 12px;
      }

      .hash-form {
        grid-template-columns: minmax(0, 1fr) auto;
        align-items: start;
      }

      .primary-action,
      .secondary-action {
        min-height: 42px;
        border-radius: 8px;
        border: 1px solid transparent;
        padding: 0.62rem 0.9rem;
        font-weight: 700;
      }

      .primary-action {
        background: var(--accent);
        color: #ffffff;
      }

      .primary-action:hover {
        background: var(--accent-strong);
      }

      .secondary-action {
        border-color: var(--border-strong);
        background: var(--surface);
        color: var(--text);
      }

      .result-heading {
        align-items: center;
      }

      .inspection-summary {
        display: grid;
        gap: 16px;
      }

      .metric-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 10px;
      }

      .metric-card {
        display: grid;
        gap: 0.25rem;
        min-width: 0;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--surface-soft);
        padding: 0.7rem 0.78rem;
      }

      .metric-label,
      .section-heading span,
      .hash-group > span,
      .output-meta,
      .mint-row span {
        color: var(--muted);
        font-size: 0.84rem;
      }

      .metric-card strong {
        min-width: 0;
        overflow-wrap: anywhere;
        font-size: 0.98rem;
      }

      .inspection-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        align-items: start;
        gap: 14px;
      }

      .inspection-section {
        display: grid;
        gap: 10px;
        align-content: start;
        min-width: 0;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 12px;
      }

      .wide-section {
        grid-column: 1 / -1;
      }

      .section-heading {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 1rem;
      }

      .section-heading h3 {
        font-size: 0.96rem;
      }

      .output-list,
      .mint-list,
      .hash-group {
        display: grid;
        gap: 8px;
        align-content: start;
        min-width: 0;
      }

      .output-row {
        display: grid;
        grid-template-columns: 3rem minmax(0, 1fr) minmax(11rem, 0.55fr);
        gap: 0.75rem;
        align-items: center;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: #ffffff;
        padding: 0.58rem 0.7rem;
      }

      .row-index {
        color: var(--muted);
        font-weight: 700;
      }

      .output-main,
      .output-meta,
      .mint-row {
        display: flex;
        align-items: center;
        gap: 0.6rem;
        min-width: 0;
      }

      .output-main {
        justify-content: space-between;
      }

      .output-main code,
      .mint-row code,
      .hash-list code {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .output-meta {
        justify-content: end;
      }

      .mint-row {
        justify-content: space-between;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: #ffffff;
        padding: 0.58rem 0.7rem;
      }

      .hash-list {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        min-width: 0;
      }

      .raw-json-block {
        display: grid;
        gap: 10px;
        margin-top: 16px;
      }

      .raw-json-block summary {
        cursor: pointer;
        color: var(--accent-strong);
        font-weight: 700;
      }

      pre {
        max-height: min(62vh, 620px);
        overflow: auto;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: #101820;
        color: #edf6f9;
        padding: 1rem;
        margin: 0;
        font-size: 0.82rem;
        line-height: 1.48;
      }

      .empty-state {
        display: grid;
        min-height: 160px;
        place-items: center;
        border: 1px dashed var(--border-strong);
        border-radius: 8px;
        background: var(--surface-soft);
        color: var(--muted);
        font-weight: 650;
      }

      .error-panel {
        border-color: #efb2ac;
        background: var(--danger-soft);
      }

      .error-panel p {
        color: var(--danger);
      }

      .stderr-block {
        display: grid;
        gap: 0.6rem;
        margin-top: 14px;
      }

      .stderr-block h3 {
        font-size: 0.96rem;
      }

      .site-footer {
        border-top: 1px solid var(--border);
        padding-block: 18px 26px;
      }

      .site-footer div {
        max-width: 82ch;
      }

      @media (max-width: 880px) {
        .workspace {
          grid-template-columns: 1fr;
        }

        .metric-grid {
          grid-template-columns: repeat(3, minmax(0, 1fr));
        }

        .provider-panel {
          position: static;
        }
      }

      @media (max-width: 640px) {
        .page-frame {
          width: min(100% - 20px, 1180px);
        }

        .topbar {
          min-height: 58px;
        }

        .brand span {
          display: none;
        }

        main.page-frame {
          padding-block: 16px 12px;
        }

        .intro-strip {
          align-items: start;
          flex-direction: column;
        }

        .intro-strip h1 {
          font-size: 1.35rem;
        }

        .tech-pills {
          justify-content: start;
        }

        .panel {
          padding: 15px;
        }

        .panel-heading {
          display: grid;
          gap: 0.7rem;
        }

        .mode-options,
        .hash-form {
          grid-template-columns: 1fr;
        }

        .metric-grid,
        .inspection-grid,
        .output-row {
          grid-template-columns: 1fr;
        }

        .section-heading,
        .output-main,
        .output-meta,
        .mint-row {
          align-items: start;
          flex-direction: column;
          justify-content: start;
          gap: 0.35rem;
        }

        .primary-action,
        .secondary-action {
          width: 100%;
        }

        .field-label {
          align-items: start;
          flex-direction: column;
          gap: 0.2rem;
        }
      }
    </style>
  </head>
  <body>
    <header class="site-header">
      <div class="page-frame topbar">
        <div class="brand">
          <strong>Conway tx inspector</strong>
          <span>Haskell ledger in the browser</span>
        </div>
        <a
          class="header-link"
          href="https://github.com/lambdasistemi/cardano-node-clients"
          target="_blank"
          rel="noopener noreferrer"
          >GitHub</a
        >
      </div>
    </header>
    <main class="page-frame">
      <div id="app"></div>
    </main>
    <footer class="page-frame site-footer">
      <div>
        Built with the upstream Haskell ledger, cross-compiled to
        <code>wasm32-wasi</code> via
        <a
          href="https://gitlab.haskell.org/haskell-wasm/ghc-wasm-meta"
          target="_blank"
          rel="noopener noreferrer"
          >ghc-wasm-meta</a
        >. Source:
        <a
          href="https://github.com/lambdasistemi/cardano-node-clients"
          target="_blank"
          rel="noopener noreferrer"
          >lambdasistemi/cardano-node-clients</a
        >.
      </div>
    </footer>
    <script src="index.js?v=inspection-panel-2"></script>
  </body>
</html>
